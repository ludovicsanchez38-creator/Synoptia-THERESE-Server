name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # --- Backend : lint + tests ---
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-backend-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: pip-backend-

      - name: Installer les dependances
        run: |
          pip install --upgrade pip
          pip install ruff pytest pytest-asyncio pytest-cov pytest-timeout
          pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Lint (ruff)
        run: ruff check app/

      - name: Tests
        env:
          THERESE_ENV: test
          THERESE_DB_PATH: ":memory:"
          SECRET_KEY: test-secret-key-ci
          JWT_SECRET: test-jwt-secret-ci
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1jaQ==
          DATA_DIR: /tmp/therese-test
          DEBUG: "true"
        run: |
          pytest tests/test_agents.py tests/test_command_registry.py \
            --timeout=60 \
            --deselect tests/test_agents.py::TestGitService \
            -x -q

  # --- Frontend : lint + build ---
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dependances
        run: npm ci

      - name: Tests (vitest)
        run: npm test

      - name: Build TypeScript + Vite
        run: npm run build
